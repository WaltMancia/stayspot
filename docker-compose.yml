version: '3.9'

services:

  # ── Infraestructura ──────────────────────────────────────────

  mysql:
    image: mysql:8.0
    container_name: stayspot_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE:      ${DB_DATABASE:-stayspot}
      MYSQL_USER:          ${DB_USERNAME:-stayspot_user}
      MYSQL_PASSWORD:      ${DB_PASSWORD:-stayspot_pass}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost",
             "-uroot", "-p${DB_ROOT_PASSWORD:-rootpass}"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: stayspot_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Aplicación ───────────────────────────────────────────────

  backend:
    build:
      context:    ./backend
      dockerfile: Dockerfile
      target:     production
    container_name: stayspot_backend
    restart: unless-stopped
    ports:
      - "8000:80"
    environment:
      APP_NAME:    StaySpot
      APP_ENV:     ${APP_ENV:-production}
      APP_KEY:     ${APP_KEY}
      APP_DEBUG:   ${APP_DEBUG:-false}
      APP_URL:     ${APP_URL:-http://localhost:8000}

      DB_CONNECTION: mysql
      DB_HOST:       mysql
      DB_PORT:       3306
      DB_DATABASE:   ${DB_DATABASE:-stayspot}
      DB_USERNAME:   ${DB_USERNAME:-stayspot_user}
      DB_PASSWORD:   ${DB_PASSWORD:-stayspot_pass}

      CACHE_STORE:    redis
      SESSION_DRIVER: redis
      REDIS_HOST:     redis

      BROADCAST_CONNECTION: pusher
      PUSHER_APP_ID:      ${PUSHER_APP_ID}
      PUSHER_APP_KEY:     ${PUSHER_APP_KEY}
      PUSHER_APP_SECRET:  ${PUSHER_APP_SECRET}
      PUSHER_APP_CLUSTER: ${PUSHER_APP_CLUSTER:-us2}

      STRIPE_KEY:            ${STRIPE_KEY}
      STRIPE_SECRET:         ${STRIPE_SECRET}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}

      RESET_SECRET:  ${RESET_SECRET}
      FRONTEND_URL:  ${FRONTEND_URL:-http://localhost}

      SANCTUM_TOKEN_EXPIRATION: 10080
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - backend_storage:/var/www/html/storage/app/public

  frontend:
    build:
      context:    ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL:            ${VITE_API_URL:-http://localhost:8000/api}
        VITE_STRIPE_KEY:         ${VITE_STRIPE_KEY}
        VITE_PUSHER_APP_KEY:     ${PUSHER_APP_KEY}
        VITE_PUSHER_APP_CLUSTER: ${PUSHER_APP_CLUSTER:-us2}
    container_name: stayspot_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data:
  backend_storage: